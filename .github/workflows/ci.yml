name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: python -m pip install -e ".[contracts,memory-core,derive]"
      - run: python -m unittest discover -s tests -v

  package-extras:
    strategy:
      fail-fast: false
      matrix:
        extra: [memory-core, search, mcp, derive, memory]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[${{ matrix.extra }}]"
      - run: python -m unittest tests.contracts.test_packaging_contract -v
        env:
          A2A_TEST_EXTRA: ${{ matrix.extra }}
